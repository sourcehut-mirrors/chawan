<!doctype html>
<title>Window test</title>
<div id=x>Fail</div>
<div id=testEl>test 1</div>
<div id=testEl>test 2</div>
<script src=asserts.js></script>
<script>
assertEquals(window.toString(), "[object Window]");
const desc = Object.getOwnPropertyDescriptor(window, "window");
assert(desc.enumerable, "window must be enumerable");
assert(!desc.configurable, "window must not be configurable");
assertEquals(window.history.state, null);
assertEquals(window.event, undefined);
assert(Object.getOwnPropertyNames(window).includes("atob"));
assert(Object.getOwnPropertyNames(window).includes("onload"));
window.localStorage.setItem("a", "x");
window.localStorage["b"] = "y";
assertEquals(window.localStorage["b"], "y")
delete window.localStorage.b;
assertEquals(window.localStorage["b"], undefined);
window.localStorage["b"] = "y";
assert(window.sessionStorage instanceof Storage);
Image = "test";
HTMLDocument = "test";
assertEquals(Image, "test");
assertEquals(HTMLDocument, "test");
window.onload = () => "first"
let second = () => "second"
window.onload = second;
assertEquals(second, window.onload);
let old = window.document;
new DOMParser().parseFromString("asdf", "text/html");
assertEquals(old, window.document);
{
	assertThrows(() => window.__proto__ = {}, TypeError);
	assertThrows(() => Object.seal(window), TypeError);
	assertThrows(() => Object.defineProperty(window, "1", {value: "hi"}), TypeError);
	(function() {
		"use strict";
		assertThrows(() => window[1] = "hi", TypeError);
	})();
	window[1] = "hi";
	assertEquals(window[1], undefined);
}
{
	assertEquals(Object.getOwnPropertyDescriptor(window, "testEl"), undefined);
	assertEquals(Object.getOwnPropertyDescriptor(window.__proto__, "testEl"), undefined);
	/* Note: Gecko fails the following test, while Blink passes it.
	   The spec says Blink is right. */
	const props = window.__proto__.__proto__;
	assertEquals(props+"", "[object WindowProperties]");
	const desc = Object.getOwnPropertyDescriptor(props, "testEl");
	assert(desc.configurable);
	assert(desc.writable);
	assert(!desc.enumerable);
	assertThrows(() => Object.defineProperty(props, "x", {value: "hi"}), TypeError);
}
{
	/* also broken in Gecko */
	const e = testEl;
	assertEquals(e[0].textContent, "test 1")
	e[0].remove();
	assertEquals(e[0].textContent, "test 2")
	e[0].remove();
}
document.getElementById("x").textContent = "Success";
</script>
