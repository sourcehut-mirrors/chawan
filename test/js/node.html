<!doctype html>
<title>Node test</title>
<div id=x>Fail</div>
<script src=asserts.js></script>
<script>
let doc = new Document();
let text = doc.createTextNode("test");
let elem = document.createElement("div");
elem.append(text);
assertEquals(text.ownerDocument, document);
assert(!document.contains(null)); /* no idea why this is allowed */
assertEquals(new Document().createCDATASection("test").cloneNode().data, "test");
assertInstanceof(new Document().createCDATASection("test"), Text);
assert(!new Document().createCDATASection("a").isEqualNode(new Text("a")));
assert(new Text("a").isEqualNode(new Text("a")));
document.getElementById("x").textContent = "Success";
</script>
